<!DOCTYPE html>
<html>
<head>
    <title>Fixed Page</title>
    <style>
        body {
            font-family: Arial;
       		margin: 0;
      		padding: 0;
        }

        .container {
            width: 900px;
            margin: auto;
        }

        .box {
            width: 300px;
            height: 150px;
            background-color: yellow;
            margin: 20px;
            float: left;
        }

        img {
            width: 400px;
        }

        h1 {
            margin-left: 250px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>My Website</h1>

    <div class="box">Box 1</div>
    <div class="box">Box 2</div>

    <img src="https://via.placeholder.com/500">

    <p>This is properly aligned sample page.</p>
</div>

</body>
</html>
